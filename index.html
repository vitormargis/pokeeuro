<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#be2727">
    <meta property="og:site_name" content="Poke Currency">
    <meta property="og:description" content="Poke Currency" />
    <meta property="og:type" content="website" />
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <title>Poke Currency</title>
</head>
<style>
    body, html {
        background: rgb(190, 39, 39);
        position: relative;
        height: 100%;
    }
    
    body {
        border-left: 40px solid rgb(126, 0, 0);
        box-shadow: inset 40px 0 0px rgb(146, 0, 0), inset 75px 0 0px rgb(178, 9, 9);
        margin: 0;
        padding: 0;
    }


    .logo {
        position: absolute;
        width: 400px;
        left: 50%;
        text-align: center;
        margin: -338px 0 0 -200px;
        top: 50%;
        background-color: #fff;
        padding: 30px 50px 20px 30px;
        border-radius: 6px 5px 60px 0px;
        border-bottom: 12px solid rgb(172, 18, 18);
        box-sizing: border-box;
        border-top: 10px solid rgb(172, 18, 18);
    }

    .pokedex {
        position: absolute;
        width: 400px;
        text-align: center;
        margin: -160px 0 0 -200px;
        top: 50%;
        padding: 30px 50px 50px;
        background-color: #fff;
        border-radius: 0px 50px 5px 50px;
        border-bottom: 10px solid #eee;
        box-sizing: border-box;
        left: 50%;
    }
    .pokedex img {
        width: 80%;
    }
    .pokedex p {
        text-transform: uppercase;
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
    }

    footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        text-align: center;
        padding: 12px 0;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
    }

    footer a {
        color: rgba(255, 255, 255, 0.85);
        text-decoration: none;
    }

    footer a:hover {
        color: #fff;
        text-decoration: underline;
    }
</style>
<body>
    <div class="logo"><img src="./pokedolar-logo.svg" alt=""></div>
    <div class="pokedex">
        <img />
        <p></p>
    </div>
    <footer>
        &copy; <span id="year"></span> <a href="https://vitormargis.com" target="_blank" rel="noopener noreferrer">vitormargis.com</a>
    </footer>

</body>
</html>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }

    const isEuro = window.location.href.includes('euro');
    const currency = isEuro ? 'eur' : 'usd';
    const currencyLabel = isEuro ? 'euro' : 'dolar';
    const currencyAPI = `https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/${currency}.min.json`;

    const pokedex = document.querySelector('.pokedex');

    fetch(currencyAPI)
        .then(res => {
            if (!res.ok) throw new Error('Currency fetch failed');
            return res.json();
        })
        .then(data => {
            const rate = data[currency].brl;
            const BRL = Math.round(rate * 100) / 100;
            const BRLtoPokemon = BRL.toString().replace('.', '');

            return fetch(`https://pokeapi.co/api/v2/pokemon/${BRLtoPokemon}`)
                .then(res => {
                    if (!res.ok) throw new Error(`No Pokemon found for #${BRLtoPokemon}`);
                    return res.json();
                })
                .then(pokemon => {
                    const padded = BRLtoPokemon.padStart(3, '0');
                    const pokemonImage = `https://assets.pokemon.com/assets/cms2/img/pokedex/full/${padded}.png`;

                    pokedex.querySelector('img').setAttribute('src', pokemonImage);
                    pokedex.querySelector('p').textContent = `#${BRLtoPokemon} ${pokemon.name}`;
                    document.querySelector('title').textContent = `Poke${currencyLabel} - #${BRLtoPokemon} ${pokemon.name}`;

                    const metas = {
                        'og:title': `Poke${currencyLabel}`,
                        'og:site_name': `Poke${currencyLabel}`,
                        'og:description': `#${BRLtoPokemon} ${pokemon.name.toUpperCase()}`,
                        'og:image': pokemonImage,
                    };
                    const head = document.head;
                    for (const [property, content] of Object.entries(metas)) {
                        const meta = document.createElement('meta');
                        meta.setAttribute('property', property);
                        meta.setAttribute('content', content);
                        head.appendChild(meta);
                    }
                });
        })
        .catch(err => {
            pokedex.querySelector('p').textContent = 'Erro ao carregar. Tente novamente.';
            console.error(err);
        });
</script>
